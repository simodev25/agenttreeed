services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trading -d trading_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://trading:trading@postgres:5432/trading_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_IGNORE_RESULT: 'true'
      CORS_ORIGINS: http://localhost:5173
      BOOTSTRAP_ADMIN_PASSWORD: admin1234
      SECRET_KEY: local-dev-secret-key-change-in-production
      WS_ALLOW_QUERY_TOKEN: 'true'
      AGENT_SKILLS_BOOTSTRAP_FILE: ${AGENT_SKILLS_BOOTSTRAP_FILE:-/app/config/agent-skills.json}
      AGENT_SKILLS_BOOTSTRAP_MODE: ${AGENT_SKILLS_BOOTSTRAP_MODE:-merge}
      AGENT_SKILLS_BOOTSTRAP_APPLY_ONCE: ${AGENT_SKILLS_BOOTSTRAP_APPLY_ONCE:-true}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-backend
    volumes:
      - ./backend/debug-traces:/app/debug-traces
      - ./backend/debug-strategy:/app/debug-strategy
    command: >
      sh -c "mkdir -p /tmp/prometheus-backend && rm -rf /tmp/prometheus-backend/* &&
      python scripts/run_migrations_safely.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://trading:trading@postgres:5432/trading_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_IGNORE_RESULT: 'true'
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-worker
      PROMETHEUS_WORKER_PORT: ${PROMETHEUS_WORKER_PORT:-9101}
      AGENTSCOPE_TRACING_URL: http://tempo:4318/v1/traces
    volumes:
      - ./backend/debug-traces:/app/debug-traces
      - ./backend/debug-governance:/app/debug-governance
      - ./backend/debug-strategy:/app/debug-strategy
    expose:
      - '${PROMETHEUS_WORKER_PORT:-9101}'
    command: >
      sh -c "mkdir -p /tmp/prometheus-worker && rm -rf /tmp/prometheus-worker/* &&
      celery -A app.tasks.celery_app.celery_app worker --loglevel=warning -B -Q $${CELERY_WORKER_QUEUES:-analysis,backtests,benchmark}
      --concurrency=$${CELERY_WORKER_CONCURRENCY:-2}
      --prefetch-multiplier=$${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      --max-tasks-per-child=$${CELERY_WORKER_MAX_TASKS_PER_CHILD:-100}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
    ports:
      - '5173:5173'
    depends_on:
      backend:
        condition: service_started

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yml"]
    expose:
      - '4317'
      - '4318'
    ports:
      - '3200:3200'    # Tempo HTTP API
    volumes:
      - ./infra/docker/tempo.yml:/etc/tempo.yml:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - '9090:9090'
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
      - worker

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/docker/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./infra/docker/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo

volumes:
  postgres_data:
